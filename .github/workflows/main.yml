name: Build atinout.apk for arm_cortex-a7_neon-vfpv4

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openwrt/sdk:main-arm_cortex-a7_neon-vfpv4
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone dan siapkan feed atinout
        run: |
          git clone --depth=1 https://github.com/4IceG/luci-app-atinout.git
          mkdir -p feed
          cp -r luci-app-atinout/atinout feed/
          echo "src-link custom $GITHUB_WORKSPACE/feed" >> feeds.conf

      - name: Perbarui feeds
        run: ./scripts/feeds update -a

      - name: Instal paket atinout dari feed lokal
        run: ./scripts/feeds install atinout

      - name: Kompilasi atinout
        run: make package/atinout/compile V=s

      - name: Upload atinout.apk
        uses: actions/upload-artifact@v4
        with:
          name: atinout-arm_cortex-a7_neon-vfpv4
          path: bin/packages/arm_cortex-a7_neon-vfpv4/custom/*.apk
          if-no-files-found: error
